<!doctype html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Inter, sans-serif;
        font-size: 13px;
        padding: 16px;
        color: #1e1e1e;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-weight: 500;
        margin-bottom: 4px;
        margin-top: 12px;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
      }
      .hint {
        font-size: 11px;
        color: #888;
        margin-top: 4px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }
      button {
        flex: 1;
        padding: 9px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        font-weight: 500;
      }
      #exportBtn {
        background: #0d99ff;
        color: #fff;
      }
      #exportBtn:hover {
        background: #0080e0;
      }
      #cancelBtn {
        background: #f0f0f0;
        color: #333;
      }
      #cancelBtn:hover {
        background: #e0e0e0;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        color: #888;
        min-height: 16px;
      }
      #status.error {
        color: #d93025;
      }
    </style>
  </head>
  <body>
    <h2>Icon Exporter</h2>

    <label for="template">Filename template</label>
    <input
      id="template"
      type="text"
      value="{Name}-{Size}"
      placeholder="{Name}-{Size}"
    />
    <p class="hint">
      Use <strong>{PropName}</strong> to insert variant property values, e.g.
      <code>{Name}-{Size}</code> → <code>arrow-16.svg</code>
    </p>

    <label for="format">Format</label>
    <select id="format">
      <option value="SVG">SVG</option>
      <option value="PNG">PNG</option>
      <option value="PDF">PDF</option>
    </select>

    <div class="row">
      <button id="exportBtn">Export selected</button>
      <button id="cancelBtn">Cancel</button>
    </div>

    <p id="status"></p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
      var status = document.getElementById("status");

      document.getElementById("exportBtn").onclick = function () {
        status.className = "";
        status.textContent = "Exporting...";
        parent.postMessage(
          {
            pluginMessage: {
              type: "export",
              template: document.getElementById("template").value,
              format: document.getElementById("format").value,
            },
          },
          "*",
        );
      };

      document.getElementById("cancelBtn").onclick = function () {
        parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
      };

      window.onmessage = function (event) {
        var msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "error") {
          status.className = "error";
          status.textContent = msg.message;
        }

        if (msg.type === "download") {
          var files = msg.files;
          status.textContent = "Zipping " + files.length + " file(s)...";

          var zip = new JSZip();
          for (var i = 0; i < files.length; i++) {
            zip.file(files[i].name, new Uint8Array(files[i].bytes));
          }

          zip.generateAsync({ type: "blob" }).then(function (blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = msg.zipName + ".zip";
            a.click();
            URL.revokeObjectURL(url);
            status.textContent = "Downloaded " + files.length + " icon(s).";
            parent.postMessage({ pluginMessage: { type: "done" } }, "*");
          });
        }
      };
    </script>
  </body>
</html>
